<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIF — Employee Directory</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f8f7f4;--surface:#ffffff;--surface2:#f1f0ec;
    --text:#1a1a18;--text2:#5f5e5a;--text3:#9a9893;
    --border:#e3e1db;--border2:#ccc;
    --accent:#185FA5;--accent-bg:#E6F1FB;--accent-text:#185FA5;
    --success:#0F6E56;--success-bg:#E1F5EE;
    --warn:#854F0B;--warn-bg:#FAEEDA;
    --radius:8px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1a1a18;--surface:#252523;--surface2:#2e2e2b;
      --text:#f0ede8;--text2:#b4b2a9;--text3:#6b6965;
      --border:#3a3936;--border2:#4a4945;
      --accent-bg:#0c3355;--accent-text:#7db8e8;
      --success-bg:#053a2d;--warn-bg:#3d2505;
    }
  }
  body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans Thai',sans-serif;color:var(--text);min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:100}
  .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-mark{width:36px;height:36px;background:#185FA5;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
  .logo-text{font-size:15px;font-weight:600;color:var(--text)}
  .logo-sub{font-size:12px;color:var(--text3);margin-top:1px}
  .search-wrap{position:relative;flex:1;min-width:200px;max-width:360px}
  .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;width:16px;height:16px}
  #search{width:100%;padding:0 12px 0 34px;height:38px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);outline:none}
  #search:focus{border-color:var(--accent)}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .fbtn{height:30px;padding:0 14px;border:1px solid var(--border);border-radius:15px;background:transparent;font-size:12px;color:var(--text2);cursor:pointer;transition:.15s}
  .fbtn:hover{border-color:var(--border2);color:var(--text)}
  .fbtn.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-text);font-weight:500}
  main{max-width:1100px;margin:0 auto;padding:20px 24px}
  .meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .meta-count{font-size:13px;color:var(--text3)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:border-color .15s,transform .1s}
  .card:hover{border-color:var(--border2);transform:translateY(-1px)}
  .card.open{border-color:var(--accent)}
  .card-top{display:flex;gap:12px;align-items:flex-start}
  .ava{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
  .info{flex:1;min-width:0}
  .nick{font-size:15px;font-weight:600;color:var(--text)}
  .eid{font-size:11px;color:var(--text3);margin-top:1px}
  .role{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;margin-top:8px;padding:2px 9px;border-radius:10px;font-weight:500}
  .bkk{background:var(--accent-bg);color:var(--accent-text)}
  .phs{background:var(--success-bg);color:var(--success)}
  .pt{background:var(--warn-bg);color:var(--warn)}
  .detail{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:none}
  .card.open .detail{display:block}
  .drow{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;font-size:12px}
  .drow svg{width:14px;height:14px;color:var(--text3);flex-shrink:0;margin-top:1px}
  .dval{color:var(--text2);word-break:break-all;line-height:1.5}
  .dname{font-size:12px;font-weight:600;color:var(--text);line-height:1.4}
  .dsub{font-size:11px;color:var(--text3);margin-top:1px}
  .dlink{font-size:12px;color:var(--accent-text)}
  .mono{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.02em}
  .copy{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:5px;border:none;cursor:pointer;margin-top:4px;background:var(--accent-bg);color:var(--accent-text);font-family:inherit}
  .copy:hover{opacity:.8}
  .copy.ok{background:var(--success-bg);color:var(--success)}
  .empty{text-align:center;padding:60px 0;color:var(--text3);font-size:14px;grid-column:1/-1}
  .empty-icon{font-size:40px;margin-bottom:12px}
</style>
</head>
<body>

    <div class="search-wrap">

      <input id="search" type="search" placeholder="ค้นหาชื่อ ตำแหน่ง nickname…">

    <div class="filters" id="filters">

</header>

const palette=[
  ["#dbeafe","#1e40af"],["#dcfce7","#166534"],["#fef3c7","#92400e"],
  ["#fce7f3","#9d174d"],["#ede9fe","#5b21b6"],["#fee2e2","#991b1b"],
  ["#d1fae5","#065f46"],["#e0f2fe","#0c4a6e"],
];

function initials(en){
  const s=en.replace(/^(Miss|Mr\.|Ms\.|Capt\.|Po\s*1)\s*/i,'').trim().split(/\s+/);
  return ((s[0]||'')[0]+(s[1]||'')[0]||'').toUpperCase();
}
function pal(id){return palette[parseInt(id.slice(-2))%palette.length]}

function badge(loc){
  if(loc==='BKK') return `<span class="badge bkk">✈ BKK</span>`;
  if(loc==='PHS') return `<span class="badge phs">🛫 PHS</span>`;
  return `<span class="badge pt">⏱ Part Time</span>`;
}

function card(p){
  const [bg,fg]=pal(p.id);
  return `<div class="card" onclick="toggle(this)">
    <div class="card-top">
      <div class="ava" style="background:${bg};color:${fg}">${initials(p.en)}</div>
      <div class="info">
        <div class="nick">${p.nick}</div>
        <div class="eid">${p.id}</div>
        <div class="role">${p.role}</div>
        ${badge(p.loc)}
      </div>
    </div>
    <div class="detail">
      <div class="drow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <div>
          <div class="dname">${p.th}</div>
          <div class="dsub">${p.en}</div>
        </div>
      </div>
      <div class="drow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <div>
          <div class="dlink">${p.email}</div>
          <button class="copy" onclick="cp(event,'${p.email}',this)">📋 คัดลอก</button>
        </div>
      </div>
      <div class="drow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <div>
          <div class="mono dval">${p.pass}</div>
          <button class="copy" onclick="cp(event,'${p.pass}',this)">📋 คัดลอก</button>
        </div>
      </div>
    </div>
  </div>`;
}

let loc='ALL';
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const list=staff.filter(p=>{
    const ml=loc==='ALL'||p.loc===loc;
    const mq=!q||[p.th,p.en,p.nick,p.role,p.id,p.email].some(v=>v.toLowerCase().includes(q));
    return ml&&mq;
  });
  document.getElementById('grid').innerHTML=list.length
    ?list.map(card).join('')
    :`<div class="empty"><div class="empty-icon">🔍</div>ไม่พบข้อมูลที่ค้นหา</div>`;
  document.getElementById('count').textContent=`แสดง ${list.length} จาก ${staff.length} คน`;
}

function toggle(el){
  const was=el.classList.contains('open');
  document.querySelectorAll('.card.open').forEach(c=>c.classList.remove('open'));
  if(!was) el.classList.add('open');
}

function cp(e,txt,btn){
  e.stopPropagation();
  navigator.clipboard.writeText(txt).then(()=>{
    btn.textContent='✅ คัดลอกแล้ว';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='📋 คัดลอก';btn.classList.remove('ok');},1800);
  });
}

document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{
  loc=b.dataset.loc;
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');render();
}));

render();
</script>
