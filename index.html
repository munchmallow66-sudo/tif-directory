<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIF — Employee Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f8fafc;
    --surface:#ffffff;
    --surface2:#f1f5f9;
    --text:#0f172a;
    --text2:#475569;
    --text3:#64748b;
    --border:#e2e8f0;
    --border2:#cbd5e1;
    --border-hover:#94a3b8;
    --accent:#185FA5;
    --accent-bg:#e0f2fe;
    --accent-text:#0369a1;
    --accent-focus:rgba(24, 95, 165, 0.15);
    --success:#0f766e;
    --success-bg:#ccfbf1;
    --warn:#b45309;
    --warn-bg:#fef3c7;
    --radius:10px;
    --header-bg:rgba(255, 255, 255, 0.85);
    --shadow:0 1px 3px 0 rgba(0,0,0,0.05),0 1px 2px -1px rgba(0,0,0,0.05);
    --shadow-hover:0 4px 6px -1px rgba(0,0,0,0.05),0 2px 4px -2px rgba(0,0,0,0.05);
  }
  
  html.dark{
    --bg:#0b0f19;
    --surface:#151d30;
    --surface2:#1e2942;
    --text:#f8fafc;
    --text2:#94a3b8;
    --text3:#64748b;
    --border:#243049;
    --border2:#38bdf8;
    --border-hover:#475569;
    --accent:#38bdf8;
    --accent-bg:#0c3355;
    --accent-text:#78c2f3;
    --accent-focus:rgba(56, 189, 248, 0.2);
    --success-bg:#042e27;
    --warn-bg:#451a03;
    --header-bg:rgba(21, 29, 48, 0.85);
    --shadow:0 1px 3px 0 rgba(0,0,0,0.2),0 1px 2px -1px rgba(0,0,0,0.2);
    --shadow-hover:0 10px 15px -3px rgba(0,0,0,0.3),0 4px 6px -4px rgba(0,0,0,0.3);
  }

  body{
    background:var(--bg);
    font-family:'Inter','Noto Sans Thai',-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--text);
    min-height:100vh;
    transition:background-color 0.3s ease,color 0.3s ease;
  }
  
  header{
    background:var(--header-bg);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:14px 24px;
    position:sticky;
    top:0;
    z-index:100;
    transition:background 0.2s,border-color 0.2s;
  }
  
  .header-inner{
    max-width:1100px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  
  .logo-wrap{
    display:flex;
    align-items:center;
    gap:16px;
  }
  
  .logo{
    display:flex;
    align-items:center;
    gap:10px;
  }
  
  .logo-mark{
    width:36px;
    height:36px;
    background:#185FA5;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-weight:700;
    font-size:14px;
    flex-shrink:0;
  }
  
  .logo-text{
    font-size:15px;
    font-weight:600;
    color:var(--text);
  }
  
  .logo-sub{
    font-size:12px;
    color:var(--text3);
    margin-top:1px;
  }
  
  .controls{
    display:flex;
    align-items:center;
    gap:12px;
    flex:1;
    justify-content:flex-end;
    min-width:280px;
  }
  
  .search-wrap{
    position:relative;
    flex:1;
    max-width:320px;
  }
  
  .search-icon{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:var(--text3);
    pointer-events:none;
    width:16px;
    height:16px;
  }
  
  #search{
    width:100%;
    padding:0 34px 0 34px;
    height:38px;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    font-size:14px;
    font-family:inherit;
    color:var(--text);
    outline:none;
    transition:all 0.2s ease;
  }
  
  #search:focus{
    border-color:var(--accent);
    background:var(--surface);
    box-shadow:0 0 0 3px var(--accent-focus);
  }

  #search-clear {
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    cursor:pointer;
    color:var(--text3);
    display:flex;
    align-items:center;
    padding:4px;
    border-radius:50%;
    transition:all 0.2s;
  }
  #search-clear:hover {
    background:var(--surface2);
    color:var(--text2);
  }
  #search-clear svg {
    width: 14px;
    height: 14px;
  }
  
  .theme-toggle-btn {
    background:var(--surface2);
    border:1px solid var(--border);
    color:var(--text2);
    cursor:pointer;
    width:38px;
    height:38px;
    border-radius:var(--radius);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.2s;
  }
  
  .theme-toggle-btn:hover {
    background:var(--border);
    color:var(--text);
  }
  
  .theme-toggle-btn svg {
    width:18px;
    height:18px;
  }
  
  html:not(.dark) .sun-icon { display: none; }
  html:not(.dark) .moon-icon { display: block; }
  html.dark .sun-icon { display: block; }
  html.dark .moon-icon { display: none; }

  .filters-wrap {
    max-width: 1100px;
    margin: 16px auto 0;
    padding: 0 24px;
  }
  
  .filters{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  
  .fbtn{
    height:32px;
    padding:0 14px;
    border:1px solid var(--border);
    border-radius:9999px;
    background:var(--surface);
    font-size:12px;
    font-weight:500;
    font-family:inherit;
    color:var(--text2);
    cursor:pointer;
    transition:all 0.2s ease;
    display:inline-flex;
    align-items:center;
  }
  
  .fbtn:hover{
    border-color:var(--border2);
    color:var(--text);
    background:var(--surface2);
  }
  
  .fbtn.on{
    background:var(--accent-bg);
    border-color:var(--accent);
    color:var(--accent-text);
  }

  .fcount {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:var(--surface2);
    color:var(--text3);
    font-size:10px;
    font-weight:600;
    padding:1px 6px;
    border-radius:10px;
    margin-left:6px;
    transition:all 0.2s;
  }

  .fbtn.on .fcount {
    background:var(--accent);
    color:#fff;
  }
  
  main{
    max-width:1100px;
    margin:0 auto;
    padding:20px 24px;
  }
  
  .meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
  }
  
  .meta-count{
    font-size:13px;
    font-weight:500;
    color:var(--text3);
  }
  
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:16px;
  }
  
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    cursor:pointer;
    transition:all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
  }
  
  .card:hover{
    transform:translateY(-2px);
    border-color:var(--border-hover);
    box-shadow:var(--shadow-hover);
  }
  
  .card.open{
    border-color:var(--accent);
    box-shadow:var(--shadow-hover);
  }
  
  .card-top{
    display:flex;
    gap:14px;
    align-items:flex-start;
  }
  
  .ava{
    width:46px;
    height:46px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    font-weight:600;
    flex-shrink:0;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05);
  }
  
  .info{
    flex:1;
    min-width:0;
  }
  
  .nick{
    font-size:14px;
    font-weight:600;
    color:var(--text);
    line-height:1.4;
    word-break:break-word;
  }
  
  .eid{
    font-size:11px;
    font-family:ui-monospace,monospace;
    color:var(--text3);
    margin-top:2px;
  }
  
  .role{
    font-size:12px;
    color:var(--text2);
    margin-top:6px;
    line-height:1.4;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  
  .badge{
    display:inline-flex;
    align-items:center;
    gap:3px;
    font-size:10px;
    margin-top:10px;
    padding:2px 8px;
    border-radius:9999px;
    font-weight:600;
  }
  
  .bkk{background:var(--accent-bg);color:var(--accent-text)}
  .phs{background:var(--success-bg);color:var(--success)}
  .pt{background:var(--warn-bg);color:var(--warn)}
  
  /* Smooth Expand details transition */
  .detail-wrapper{
    display:grid;
    grid-template-rows:0fr;
    transition:grid-template-rows 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    overflow:hidden;
  }
  .card.open .detail-wrapper{
    grid-template-rows:1fr;
  }
  .detail-content{
    min-height:0;
    opacity:0;
    transition:opacity 0.2s ease-out, padding 0.25s ease;
    padding-top:0;
  }
  .card.open .detail-content{
    opacity:1;
    padding-top:14px;
    border-top:1px solid var(--border);
    margin-top:14px;
  }
  
  .drow{
    display:flex;
    gap:10px;
    align-items:flex-start;
    margin-bottom:12px;
    font-size:12px;
  }
  .drow:last-child {
    margin-bottom:0;
  }
  
  .drow svg{
    width:14px;
    height:14px;
    color:var(--text3);
    flex-shrink:0;
    margin-top:2px;
  }
  
  .dval-wrap {
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  
  .dval{
    color:var(--text2);
    word-break:break-all;
    line-height:1.5;
  }
  
  .dname{
    font-size:12px;
    font-weight:600;
    color:var(--text);
    line-height:1.4;
  }
  
  .dsub{
    font-size:11px;
    color:var(--text3);
    margin-top:1px;
  }
  
  .dlink{
    font-size:12px;
    color:var(--accent-text);
    font-weight:500;
  }
  
  .pwd-container {
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:2px;
  }

  .pwd-text {
    font-family:ui-monospace,monospace;
    font-size:11px;
    background:var(--surface2);
    padding:2px 8px;
    border-radius:4px;
    color:var(--text2);
    border:1px solid var(--border);
    min-width:110px;
    display:inline-block;
    text-align:center;
    letter-spacing: 0.05em;
  }
  
  .pwd-toggle {
    background:none;
    border:none;
    cursor:pointer;
    color:var(--text3);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:4px;
    border-radius:4px;
    transition:all 0.2s;
  }
  
  .pwd-toggle:hover {
    background:var(--surface2);
    color:var(--text2);
  }
  
  .pwd-toggle svg {
    width:14px;
    height:14px;
  }
  
  .mono{
    font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    font-size:11px;
    letter-spacing:.02em;
  }
  
  .copy{
    display:inline-flex;
    align-items:center;
    gap:4px;
    font-size:10px;
    font-weight:500;
    padding:3px 8px;
    border-radius:6px;
    border:1px solid var(--border);
    cursor:pointer;
    margin-top:4px;
    background:var(--surface);
    color:var(--text2);
    font-family:inherit;
    align-self:flex-start;
    transition:all 0.2s;
  }
  
  .copy:hover{
    background:var(--accent-bg);
    color:var(--accent-text);
    border-color:var(--accent);
  }
  
  .copy.ok{
    background:var(--success-bg);
    color:var(--success);
    border-color:var(--success-bg);
  }
  
  /* Highlight matching text */
  .hl {
    background: rgba(245, 158, 11, 0.22);
    border-radius: 2px;
    color: inherit;
  }
  
  .empty{
    text-align:center;
    padding:60px 24px;
    color:var(--text3);
    font-size:14px;
    grid-column:1/-1;
    background:var(--surface);
    border-radius:12px;
    border:1px dashed var(--border);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  
  .empty-icon{
    font-size:48px;
    margin-bottom:16px;
  }

  .reset-btn {
    margin-top: 16px;
    height: 36px;
    padding: 0 16px;
    border-radius: 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    font-weight: 500;
    font-size: 13px;
    transition: opacity 0.2s;
  }
  .reset-btn:hover {
    opacity: 0.9;
  }
  
  /* Single View mode for displaying one person at a time */
  .grid.single-view {
    grid-template-columns: 1fr;
    max-width: 480px;
    margin: 0 auto;
  }
  .grid.single-view .card:not(.open) {
    display: none;
  }
  
  /* Copy All button styles */
  .copy-all {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    cursor: pointer;
    background: var(--accent-bg);
    color: var(--accent-text);
    font-family: inherit;
    width: 100%;
    margin-top: 16px;
    transition: all 0.2s ease;
  }
  .copy-all:hover {
    background: var(--accent);
    color: #fff;
  }
  .copy-all.ok {
    background: var(--success-bg);
    color: var(--success);
    border-color: var(--success-bg);
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo-wrap">
      <div class="logo">
        <div class="logo-mark">TIF</div>
        <div>
          <div class="logo-text">Employee Directory</div>
          <div class="logo-sub">Thai International Flying &amp; Training</div>
        </div>
      </div>
    </div>
    
    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="search" placeholder="ค้นหาชื่อ ตำแหน่ง nickname…" autocomplete="off">
        <button id="search-clear" type="button" aria-label="Clear search" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="filters-wrap">
  <div class="filters" id="filters">
    <button class="fbtn on" data-loc="ALL">ทั้งหมด <span class="fcount" id="count-all">0</span></button>
    <button class="fbtn" data-loc="BKK">BKK <span class="fcount" id="count-bkk">0</span></button>
    <button class="fbtn" data-loc="PHS">PHS <span class="fcount" id="count-phs">0</span></button>
    <button class="fbtn" data-loc="Part Time">Part Time <span class="fcount" id="count-pt">0</span></button>
  </div>
</div>

<main>
  <div class="meta">
    <span class="meta-count" id="count"></span>
    <button id="back-btn" class="fbtn" style="display:none;" onclick="closeAllCards()">← แสดงทุกคน</button>
  </div>
  <div class="grid" id="grid"></div>
</main>

const palette=[
  ["#dbeafe","#1e40af"],["#dcfce7","#166534"],["#fef3c7","#92400e"],
  ["#fce7f3","#9d174d"],["#ede9fe","#5b21b6"],["#fee2e2","#991b1b"],
  ["#d1fae5","#065f46"],["#e0f2fe","#0c4a6e"],
];

// Initialize theme
const currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
if (currentTheme === 'dark') {
  document.documentElement.classList.add('dark');
} else {
  document.documentElement.classList.remove('dark');
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
});

function initials(en){
  const s=en.replace(/^(Miss|Mr\.|Ms\.|Capt\.|Po\s*1)\s*/i,'').trim().split(/\s+/);
  return ((s[0]||'')[0]+(s[1]||'')[0]||'').toUpperCase();
}
function pal(id){return palette[parseInt(id.slice(-2))%palette.length]}

function badge(loc){
  if(loc==='BKK') return `<span class="badge bkk">✈ BKK</span>`;
  if(loc==='PHS') return `<span class="badge phs">🛫 PHS</span>`;
  return `<span class="badge pt">⏱ Part Time</span>`;
}

function highlightText(text, q) {
  if (!q) return text;
  const regex = new RegExp(`(${q.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<mark class="hl">$1</mark>');
}

function card(p, q){
  const [bg,fg]=pal(p.id);
  const displayName = p.id === '680012' ? p.en : p.th;
  const displaySub = p.id === '680012' ? p.th : p.en;
  const nickPrefix = p.id === '680012' ? 'Mr. ' : 'คุณ';
  
  const highlightedName = highlightText(displayName, q);
  const highlightedRole = highlightText(p.role, q);
  const highlightedId = highlightText(p.id, q);
  const highlightedEmail = highlightText(p.email, q);
  const highlightedSub = highlightText(displaySub, q);
  const highlightedNick = highlightText(p.nick, q);

  return `<div class="card" onclick="toggle(this)">
    <div class="card-top">
      <div class="ava" style="background:${bg};color:${fg}">${initials(p.en)}</div>
      <div class="info">
        <div class="nick">${highlightedName}</div>
        <div style="font-size:11.5px; color:var(--text3); font-weight:500; margin-top:2px;">ชื่อเล่น: ${nickPrefix}${highlightedNick}</div>
        <div class="eid">${highlightedId}</div>
        <div class="role">${highlightedRole}</div>
        ${badge(p.loc)}
      </div>
    </div>
    <div class="detail-wrapper">
      <div class="detail-content">
        <div class="drow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <div class="dval-wrap">
            <div class="dname">ชื่อเล่น: ${nickPrefix}${highlightedNick}</div>
            <div class="dsub">${highlightedSub}</div>
            <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">
              <button class="copy" onclick="cp(event,'${displayName}',this)">📋 คัดลอกชื่อจริง</button>
              <button class="copy" onclick="cp(event,'${p.nick}',this)">📋 คัดลอกชื่อเล่น</button>
            </div>
          </div>
        </div>
        <div class="drow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <div class="dval-wrap">
            <div class="dname">ตำแหน่ง: ${highlightedRole}</div>
            <div class="dsub">รหัสพนักงาน: ${highlightedId} (${p.loc})</div>
            <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">
              <button class="copy" onclick="cp(event,'${p.role}',this)">📋 คัดลอกตำแหน่ง</button>
              <button class="copy" onclick="cp(event,'${p.id}',this)">📋 คัดลอกรหัส</button>
            </div>
          </div>
        </div>
        <div class="drow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <div class="dval-wrap">
            <div class="dlink">${highlightedEmail}</div>
            <button class="copy" onclick="cp(event,'${p.email}',this)">📋 คัดลอกเมล</button>
          </div>
        </div>
        <div class="drow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <div class="dval-wrap">
            <div class="pwd-container">
              <span class="pwd-text masked" data-pwd="${p.pass}">••••••••</span>
              <button class="pwd-toggle" onclick="togglePwd(event, this)" title="แสดง/ซ่อนรหัสผ่าน">
                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61M2 2l20 20"/></svg>
              </button>
              <button class="copy" onclick="cp(event,'${p.pass}',this)" style="margin-top:0;">📋 คัดลอกรหัส</button>
            </div>
          </div>
        </div>
        <div style="margin-top: 14px; border-top: 1px dashed var(--border); padding-top: 14px; width: 100%;">
          <button class="copy-all" onclick="copyAll(event,'${p.id}',this)">📋 คัดลอกข้อมูลทั้งหมด</button>
        </div>
      </div>
    </div>
  </div>`;
}

let loc='ALL';

function render(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const list=staff.filter(p=>{
    const ml=loc==='ALL'||p.loc===loc;
    const mq=!q||[p.th,p.en,p.nick,p.role,p.id,p.email].some(v=>v.toLowerCase().includes(q));
    return ml&&mq;
  });
  document.getElementById('grid').innerHTML=list.length
    ?list.map(p => card(p, q)).join('')
    :`<div class="empty"><div class="empty-icon">🔍</div>ไม่พบข้อมูลที่ค้นหา<button class="reset-btn" onclick="resetFilters()">ล้างการค้นหา</button></div>`;
  document.getElementById('count').textContent=`แสดง ${list.length} จาก ${staff.length} คน`;

  // Reset single-view mode on render
  document.getElementById('grid').classList.remove('single-view');
  document.getElementById('back-btn').style.display = 'none';
}

function toggle(el){
  const was=el.classList.contains('open');
  document.querySelectorAll('.card.open').forEach(c=>c.classList.remove('open'));
  
  if(!was) {
    el.classList.add('open');
    document.getElementById('grid').classList.add('single-view');
    document.getElementById('back-btn').style.display = 'inline-flex';
    // Scroll to the top of the card smoothly
    setTimeout(() => {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  } else {
    document.getElementById('grid').classList.remove('single-view');
    document.getElementById('back-btn').style.display = 'none';
  }
}

function closeAllCards() {
  resetFilters();
}

function cp(e,txt,btn){
  e.stopPropagation();
  navigator.clipboard.writeText(txt).then(()=>{
    const oldText = btn.textContent;
    btn.textContent='✅ คัดลอกแล้ว';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent=oldText;btn.classList.remove('ok');},1800);
  });
}

function copyAll(e, id, btn){
  e.stopPropagation();
  const p=staff.find(x=>x.id===id);
  if(!p) return;
  const displayName = p.id === '680012' ? p.en : p.th;
  const displaySub = p.id === '680012' ? p.th : p.en;
  const nickPrefix = p.id === '680012' ? 'Mr. ' : 'คุณ';
  const text = `ชื่อ-นามสกุล: ${displayName} (${nickPrefix}${p.nick})
ชื่อภาษาอังกฤษ/ไทย: ${displaySub}
รหัสพนักงาน: ${p.id}
ตำแหน่ง: ${p.role}
สังกัด/พื้นที่: ${p.loc}
อีเมล: ${p.email}
รหัสผ่าน: ${p.pass}`;

  navigator.clipboard.writeText(text).then(()=>{
    const oldText = btn.textContent;
    btn.textContent = '✅ คัดลอกข้อมูลทั้งหมดแล้ว';
    btn.classList.add('ok');
    setTimeout(()=>{
      btn.textContent = oldText;
      btn.classList.remove('ok');
    },1800);
  });
}

function togglePwd(e, btn) {
  e.stopPropagation();
  const textEl = btn.previousElementSibling;
  const pwd = textEl.dataset.pwd;
  const isMasked = textEl.classList.contains('masked');
  const eyeOpen = btn.querySelector('.eye-open');
  const eyeClosed = btn.querySelector('.eye-closed');
  if (isMasked) {
    textEl.textContent = pwd;
    textEl.classList.remove('masked');
    eyeOpen.style.display = 'none';
    eyeClosed.style.display = 'block';
  } else {
    textEl.textContent = '••••••••';
    textEl.classList.add('masked');
    eyeOpen.style.display = 'block';
    eyeClosed.style.display = 'none';
  }
}

function updateFilterCounts() {
  const allCount = staff.length;
  const bkkCount = staff.filter(p => p.loc === 'BKK').length;
  const phsCount = staff.filter(p => p.loc === 'PHS').length;
  const ptCount = staff.filter(p => p.loc === 'Part Time').length;

  document.getElementById('count-all').textContent = allCount;
  document.getElementById('count-bkk').textContent = bkkCount;
  document.getElementById('count-phs').textContent = phsCount;
  document.getElementById('count-pt').textContent = ptCount;
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  loc = 'ALL';
  document.querySelectorAll('#filters .fbtn').forEach(x => {
    if (x.dataset.loc === 'ALL') x.classList.add('on');
    else x.classList.remove('on');
  });
  render();
}

const searchInput = document.getElementById('search');
const searchClearBtn = document.getElementById('search-clear');

searchInput.addEventListener('input', () => {
  searchClearBtn.style.display = searchInput.value ? 'flex' : 'none';
  render();
});

searchClearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchClearBtn.style.display = 'none';
  searchInput.focus();
  render();
});

document.querySelectorAll('#filters .fbtn').forEach(b=>b.addEventListener('click',()=>{
  loc=b.dataset.loc;
  document.querySelectorAll('#filters .fbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');render();
}));

updateFilterCounts();
render();
</script>
